<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>دعوة زفاف | Wedding Invitation</title>
<meta name="description" content="دعوة زفاف فاخرة">

<!-- خطوط فاخرة: Serif إنجليزي + خط عربي أنيق -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Aref+Ruqaa:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="welcomeOverlay" class="welcome-overlay" aria-live="polite">
  <div class="welcome-card">
    <p class="welcome-label">Welcome Every Day</p>
    <button id="enterBtn" class="enter-btn">Enter Website</button>
  </div>
</div>

<!-- ============ زر الموسيقى العائم ============ -->
<button id="musicToggle" class="music-toggle" aria-label="تشغيل الموسيقى" aria-pressed="false">
  <svg class="icon-note" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.4"/>
  </svg>
  <span class="music-bars" aria-hidden="true"><i></i><i></i><i></i></span>
</button>

<!-- ============ القسم الأول: Hero ============ -->
<section id="hero" class="section hero" aria-label="الصفحة الرئيسية">
  <div class="bg-wrap">
    <img src="1.jpg" alt="خشبة المسرح، الستائر الحمراء والميكروفون" class="bg-img">
    <div class="hero-scrim"></div>
  </div>

  <div class="hero-content">
    <p class="eyebrow reveal" style="--d:0s">حفل زفاف</p>
    <h1 class="hero-names reveal" style="--d:.15s">
      <span id="groomName">—</span>
      <span class="amp">&amp;</span>
      <span id="brideName">—</span>
    </h1>

    <div class="countdown reveal" style="--d:.35s" id="countdown" aria-live="polite">
      <div class="cd-unit"><span class="cd-num" id="cdDays">00</span><span class="cd-label">يوم</span></div>
      <div class="cd-sep">•</div>
      <div class="cd-unit"><span class="cd-num" id="cdHours">00</span><span class="cd-label">ساعة</span></div>
      <div class="cd-sep">•</div>
      <div class="cd-unit"><span class="cd-num" id="cdMinutes">00</span><span class="cd-label">دقيقة</span></div>
      <div class="cd-sep">•</div>
      <div class="cd-unit"><span class="cd-num" id="cdSeconds">00</span><span class="cd-label">ثانية</span></div>
    </div>

    <div class="scroll-cue reveal" style="--d:.55s" aria-hidden="true">
      <span></span>
    </div>
  </div>
</section>

<!-- ============ القسم الثاني: رسالة الدعوة ============ -->
<section id="invitation" class="section invitation" aria-label="رسالة الدعوة">
  <div class="bg-wrap">
    <img src="2.jpg" alt="رسالة الدعوة: كل عاشق وله ألحان وهذه ليلتنا. ندعوكم للاحتفال ببداية مغامرتنا الكبرى" class="bg-img reveal-on-scroll" loading="lazy">
  </div>
</section>

<!-- ============ القسم الثالث: مكان الحفل ============ -->
<section id="location" class="section location" aria-label="مكان الحفل">
  <div class="bg-wrap">
    <img src="3.jpg" alt="Hall Acacia، 30/8، أول قاعة شمال الكوبري" class="bg-img reveal-on-scroll" loading="lazy">
  </div>
  <a href="#" id="viewLocationBtn" class="location-hit" target="_blank" rel="noopener" aria-label="عرض الموقع على خرائط جوجل"></a>
</section>

<!-- ============ القسم الرابع: مباركات الأحبة ============ -->
<section id="comments" class="section comments-section" aria-label="مباركات الأحبة">
  <div class="bg-wrap">
    <img src="4.jpg" alt="" class="bg-img" loading="lazy" aria-hidden="true">
  </div>

  <div class="comments-content">
    <h2 class="comments-title reveal-on-scroll">مباركات الأحبة</h2>

    <form id="commentForm" class="comment-form reveal-on-scroll" novalidate>
      <input type="text" id="commentName" class="field field-name" placeholder="الاسم" maxlength="40" required autocomplete="name">
      <textarea id="commentMessage" class="field field-message" placeholder="اكتب مباركتك هنا..." maxlength="280" rows="3" required></textarea>
      <button type="submit" class="btn-submit">إرسال المباركة</button>
      <p id="commentStatus" class="comment-status" role="status" aria-live="polite"></p>
    </form>

    <ul id="commentsList" class="comments-list" aria-live="polite"></ul>
  </div>
</section>

<!-- Firebase (لتخزين المباركات ومشاركتها بين كل الزوار عبر Realtime Database)
     محمّلة محليًا من مجلد الموقع نفسه لتفادي حجبها من بعض المتصفحات/الإضافات لو اتحمّلت من CDN خارجي -->
<script src="assets/vendor/firebase/firebase-app-compat.js"></script>
<script src="assets/vendor/firebase/firebase-database-compat.js"></script>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
